<svg viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <!-- Body -->
  <ellipse cx="90" cy="110" rx="50" ry="45" fill="#E0F7FA"/>
  <!-- Head -->
  <ellipse cx="90" cy="70" rx="48" ry="42" fill="#E8F5E9"/>
  <!-- Ears (bunny) -->
  <ellipse cx="65" cy="35" rx="10" ry="22" fill="#E0F7FA"/>
  <ellipse cx="115" cy="35" rx="10" ry="22" fill="#E0F7FA"/>
  <ellipse cx="65" cy="32" rx="6" ry="14" fill="#FFF"/>
  <ellipse cx="115" cy="32" rx="6" ry="14" fill="#FFF"/>
  <!-- Eyes -->
  <circle cx="78" cy="68" r="5" fill="#3E2723"/>
  <circle cx="102" cy="68" r="5" fill="#3E2723"/>
  <circle cx="79" cy="66" r="2" fill="white"/>
  <circle cx="103" cy="66" r="2" fill="white"/>
  <!-- Blush -->
  <ellipse cx="70" cy="78" rx="7" ry="4" fill="#FFAB91" opacity="0.5"/>
  <ellipse cx="110" cy="78" rx="7" ry="4" fill="#FFAB91" opacity="0.5"/>
  <!-- Smile -->
  <path d="M82 82 Q90 88 98 82" stroke="#3E2723" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Clipboard -->
  <rect x="120" y="60" width="35" height="45" rx="4" fill="#FFF" stroke="#B2DFDB" stroke-width="2"/>
  <rect x="128" y="55" width="18" height="6" rx="3" fill="#80CBC4"/>
  <!-- Checkmark on clipboard -->
  <path d="M128 78 L135 85 L148 72" stroke="#4DB6AC" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Pencil -->
  <rect x="125" y="45" width="6" height="25" rx="2" fill="#FFE0B2" transform="rotate(-20 128 57)"/>
  <polygon points="124,46 128,42 132,46" fill="#FFCC80" transform="rotate(-20 128 57)"/>
</svg>
